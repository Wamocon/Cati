<title>1Çatı · Kosten, Angebot & Markt</title>

<style>
  /* Palette matched 1:1 to the live app (New Level Premium / platform, light by default). */
  :root {
    --paper:      #F7F9F8;   /* app --background */
    --band:       #061a17;   /* app premium dark green band */
    --grid:       rgba(6,107,99,.045);
    --rule:       #DAE3E0;   /* app --border */
    --fg:         #101820;   /* app --foreground */
    --fg-soft:    #3A4A46;
    --fg-faint:   #64716D;   /* app --muted-foreground */
    --panel:      #FFFFFF;   /* app --card */
    --panel-2:    #EEF3F1;   /* app --muted */
    --teal:       #066B63;   /* app --primary */
    --teal-lift:  #09877C;   /* app --ring */
    --brass:      #B9822B;   /* app --accent */
    --crit:       #D0445B;   /* app --destructive */
    --ok:         #1f9d57;
    --shadow:     0 1px 2px rgba(16,24,32,.05), 0 18px 44px -22px rgba(16,24,32,.16);

    --display: "Aptos", "Segoe UI", system-ui, -apple-system, Roboto, "Helvetica Neue", Arial, sans-serif;
    --body:    "Aptos", "Segoe UI", system-ui, -apple-system, Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono:    ui-monospace, "Cascadia Mono", "SF Mono", "Segoe UI Mono", Menlo, Consolas, monospace;

    --r:    18px;
    --r-sm: 10px;
    --maxw: 1200px;
    --step: clamp(2.4rem, 5vw, 4.2rem);
    color-scheme: light;
  }

  /* Light is the hard default (matches the app's forcedTheme="light"); dark is opt-in via the toggle only. */
  :root[data-theme="dark"] {
    --paper:#060B0C; --band:#03110F; --fg:#F3FAF8; --fg-soft:#C6D4D0; --fg-faint:#93a6a1;
    --panel:#0f1c1d; --panel-2:#16292a; --rule:rgba(255,255,255,.10);
    --grid:rgba(50,214,189,.09); --teal:#32D6BD; --teal-lift:#5fe4d0; --brass:#E2B75D; --crit:#FB7185; --ok:#4FD9C4;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 18px 44px -22px rgba(0,0,0,.62);
    color-scheme: dark;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: radial-gradient(1200px 520px at 50% -160px, color-mix(in srgb, var(--teal) 7%, transparent), transparent 70%), var(--paper);
    color: var(--fg);
    font-family: var(--body);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 clamp(1rem, 4vw, 2.5rem); }

  /* ---------- top bar ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(12px);
    background: color-mix(in srgb, var(--paper) 86%, transparent);
    border-bottom: 1px solid var(--rule);
  }
  .topbar-in { display: flex; align-items: center; gap: 1rem; padding: .7rem 0; flex-wrap: wrap; }
  .brand { display: flex; align-items: baseline; gap: .55rem; margin-right: auto; }
  .brand-mark { font-family: var(--display); font-weight: 800; font-size: 1.1rem; letter-spacing: -.02em;
    background: linear-gradient(135deg, var(--teal), var(--brass)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .brand-sub { font-family: var(--mono); font-size: .66rem; text-transform: uppercase; letter-spacing: .14em; color: var(--fg-faint); }

  /* ---------- tab nav ---------- */
  .tabs { display: flex; gap: 2px; background: var(--panel-2); padding: 4px; border-radius: 999px; flex-wrap: wrap; }
  .tab {
    font-family: var(--display); font-size: .8rem; font-weight: 600; letter-spacing: -.01em;
    border: 0; background: transparent; color: var(--fg-soft);
    padding: .4rem .8rem; cursor: pointer; border-radius: 999px;
  }
  .tab[aria-pressed="true"] { background: var(--teal); color: #fff; }
  .tab:focus-visible, .lang:focus-visible, .theme-btn:focus-visible { outline: 2px solid var(--teal-lift); outline-offset: 2px; }

  .langs { display: flex; gap: 2px; background: var(--panel-2); padding: 3px; border-radius: 999px; }
  .lang {
    font-family: var(--mono); font-size: .68rem; letter-spacing: .08em; text-transform: uppercase;
    border: 0; background: transparent; color: var(--fg-soft); padding: .3rem .58rem; cursor: pointer; border-radius: 999px;
  }
  .lang[aria-pressed="true"] { background: var(--teal); color: #fff; }
  .theme-btn {
    border: 1px solid var(--rule); background: var(--panel); color: var(--fg-soft);
    font-family: var(--mono); font-size: .68rem; padding: .35rem .55rem; cursor: pointer; border-radius: 999px;
  }

  /* ---------- pages ---------- */
  .page { padding: var(--step) 0 calc(var(--step) * .5); }
  .page[hidden] { display: none; }

  .eyebrow {
    display: inline-flex; align-items: center; gap: .5rem;
    font-family: var(--body); font-size: .66rem; font-weight: 800; letter-spacing: .16em; text-transform: uppercase;
    color: var(--teal); margin-bottom: 1.2rem; padding: .42rem .8rem;
    border: 1px solid color-mix(in srgb, var(--teal) 22%, transparent);
    background: color-mix(in srgb, var(--teal) 6%, transparent); border-radius: 999px;
  }
  h1 {
    font-family: var(--display); font-weight: 800; font-size: clamp(2rem, 5.4vw, 3.4rem);
    line-height: 1.03; letter-spacing: -.04em; margin: 0 0 1rem; text-wrap: balance; max-width: 24ch; color: var(--fg);
  }
  h1 .accent {
    background: linear-gradient(135deg, var(--teal) 0%, var(--brass) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: var(--teal);
  }
  .lede { font-size: clamp(1rem, 1.6vw, 1.15rem); color: var(--fg-soft); max-width: 64ch; margin: 0; }
  .disc { margin: 1.4rem 0 0; font-size: .84rem; color: var(--fg-faint); max-width: 76ch;
          border-left: 2px solid var(--rule); padding-left: .9rem; }

  /* premium hero band, mirrors the New Level Premium dark-green header */
  .hero {
    position: relative; overflow: hidden; isolation: isolate;
    background: var(--band); color: #fff;
    border-radius: calc(var(--r) + 6px); padding: clamp(2rem, 4.5vw, 3.4rem) clamp(1.6rem, 4vw, 2.8rem);
    margin: 0 0 2.4rem; box-shadow: 0 30px 70px -34px rgba(3,16,14,.75);
  }
  .hero::before {
    content: ""; position: absolute; inset: 0; z-index: -2; opacity: .7;
    background:
      linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
    background-size: 64px 64px;
  }
  .hero::after {
    content: ""; position: absolute; inset: -50% -25% auto auto; width: 65%; height: 160%; z-index: -1;
    background: radial-gradient(closest-side, rgba(15,160,144,.5), transparent 70%),
                radial-gradient(closest-side, rgba(226,183,93,.26), transparent 72%);
  }
  .hero .eyebrow { color: #9ff0e0; border-color: rgba(255,255,255,.22); background: rgba(255,255,255,.08); }
  .hero h1 { color: #fff; }
  .hero h1 .accent { background: linear-gradient(135deg, #4FD9C4 0%, #E2B75D 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .hero .lede { color: rgba(255,255,255,.82); }
  .hero .disc { color: rgba(255,255,255,.66); border-left-color: rgba(255,255,255,.24); }
  .hero .kpis { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin: 1.8rem 0 .4rem; }
  @media (max-width: 680px){ .hero .kpis { grid-template-columns: 1fr 1fr; } }
  .hero .kpi { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14); border-radius: 14px; padding: .9rem 1rem; backdrop-filter: blur(6px); }
  .hero .kpi .v { font-family: var(--mono); font-weight: 700; font-size: clamp(1rem, 1.6vw, 1.2rem); color: #fff; font-variant-numeric: tabular-nums; }
  .hero .kpi .l { font-size: .72rem; color: rgba(255,255,255,.72); margin-top: .25rem; line-height: 1.35; }
  .hero-lead { display: grid; grid-template-columns: 1.08fr .92fr; gap: 1.6rem; align-items: center; }
  @media (max-width: 920px){ .hero-lead { grid-template-columns: 1fr; } .hero-viz { order: -1; min-height: 240px; } }
  .hero-lead .kpis { grid-template-columns: 1fr 1fr; }
  .hero-viz { position: relative; min-height: 340px; align-self: stretch; }
  .hero-viz canvas { width: 100%; height: 100%; min-height: 340px; display: block; }
  .viz-cap { position: absolute; left: 0; right: 0; bottom: 2px; text-align: center; font-family: var(--mono);
             font-size: .66rem; letter-spacing: .12em; color: rgba(255,255,255,.6); text-transform: uppercase; }

  section.blk { padding: var(--step) 0 0; border-top: 1px solid var(--rule); margin-top: var(--step); }
  h2 { font-family: var(--display); font-weight: 800; font-size: clamp(1.5rem, 2.8vw, 2.1rem); letter-spacing: -.03em; margin: 0 0 .5rem; text-wrap: balance; }
  .sec-note { color: var(--fg-soft); max-width: 66ch; margin: 0 0 2rem; }

  /* ---------- cockpit (offer) ---------- */
  .cockpit { display: grid; grid-template-columns: minmax(0, 340px) minmax(0, 1fr); gap: 1.4rem; align-items: start; margin-top: 2.2rem; }
  @media (max-width: 940px) { .cockpit { grid-template-columns: 1fr; } }

  .panel { background: var(--panel); border: 1px solid var(--rule); border-radius: var(--r); box-shadow: var(--shadow); }
  .controls { display: flex; flex-direction: column; gap: 1.15rem; padding: 1.3rem; }
  .ctl-head { display: flex; justify-content: space-between; align-items: baseline; }
  .ctl-head b { font-family: var(--mono); font-size: .62rem; text-transform: uppercase; letter-spacing: .12em; color: var(--teal); font-weight: 600; }
  .btn-reset { border: 1px solid var(--rule); background: var(--panel-2); color: var(--fg-soft); font-family: var(--mono); font-size: .62rem; text-transform: uppercase; letter-spacing: .1em; padding: .3rem .55rem; border-radius: 999px; cursor: pointer; }
  .grp { display: flex; flex-direction: column; gap: .5rem; }
  .grp > .glabel { font-family: var(--mono); font-size: .6rem; text-transform: uppercase; letter-spacing: .12em; color: var(--fg-faint); }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }
  .fld { display: flex; flex-direction: column; gap: .25rem; }
  .fld span { font-size: .76rem; color: var(--fg-soft); }
  .fld input, .fld select {
    width: 100%; font-family: var(--mono); font-size: .9rem; padding: .55rem .6rem;
    background: var(--panel); color: var(--fg); border: 1px solid var(--rule); border-radius: var(--r-sm);
    font-variant-numeric: tabular-nums;
  }
  .fld input:hover, .fld select:hover { border-color: color-mix(in srgb, var(--teal) 40%, var(--rule)); }
  .fld input:focus-visible, .fld select:focus-visible { outline: 2px solid var(--teal-lift); outline-offset: 1px; }
  .hint { font-size: .72rem; color: var(--fg-faint); }

  /* results */
  .results { display: flex; flex-direction: column; gap: 1.2rem; }
  .adv { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 1px; background: var(--rule); border: 1px solid var(--rule); border-radius: var(--r); overflow: hidden; }
  @media (max-width: 620px) { .adv { grid-template-columns: 1fr 1fr; } }
  .adv-c { background: var(--panel); padding: 1rem 1.1rem; }
  .adv-l { font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; color: var(--fg-faint); font-family: var(--mono); }
  .adv-n { font-family: var(--mono); font-size: clamp(1.15rem, 2.4vw, 1.5rem); font-weight: 700; letter-spacing: -.02em; font-variant-numeric: tabular-nums; margin-top: .25rem; }
  .adv-n.teal { color: var(--teal); }
  .adv-n.brass { color: var(--brass); }
  .adv-sub { font-size: .7rem; color: var(--fg-faint); margin-top: .15rem; }

  .badges { display: flex; flex-wrap: wrap; gap: .5rem; }
  .badge { font-family: var(--mono); font-size: .64rem; letter-spacing: .04em; padding: .35rem .6rem; border-radius: 999px;
           background: color-mix(in srgb, var(--teal) 12%, transparent); color: var(--teal); border: 1px solid color-mix(in srgb, var(--teal) 30%, transparent); }

  .card { background: var(--panel); border: 1px solid var(--rule); border-radius: var(--r); padding: 1.4rem; box-shadow: var(--shadow); transition: box-shadow .2s, transform .2s; }
  .card:hover { box-shadow: 0 1px 2px rgba(16,24,32,.05), 0 24px 56px -24px rgba(16,24,32,.22); }
  .card > h3 { font-family: var(--display); font-size: 1rem; margin: 0 0 .3rem; letter-spacing: -.01em; }
  .card > .sub { font-size: .8rem; color: var(--fg-soft); margin: 0 0 1rem; }

  .gval .row { display: flex; justify-content: space-between; align-items: baseline; padding: .55rem 0; border-top: 1px dashed var(--rule); font-size: .88rem; }
  .gval .row:first-of-type { border-top: 0; }
  .gval .row.tot { border-top: 1px solid var(--rule); margin-top: .3rem; font-weight: 700; }
  .gval .row b { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .gval .row .teal { color: var(--teal); }
  .gval .row .brass { color: var(--brass); }

  .prog-wrap { display: flex; align-items: center; gap: .8rem; margin-top: .3rem; }
  .prog { flex: 1; height: 8px; background: var(--panel-2); border-radius: 4px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--teal); border-radius: 4px; transition: width .3s; }
  .prog-txt { font-family: var(--mono); font-size: .72rem; color: var(--fg-faint); white-space: nowrap; }
  .staffel { margin-top: 1rem; font-family: var(--mono); font-size: .78rem; }
  .staffel .srow { display: flex; justify-content: space-between; padding: .2rem 0; color: var(--fg-soft); }
  .staffel .srow.hi { font-weight: 700; color: var(--teal); }

  canvas.oc { display: block; width: 100%; height: 210px; }
  .oc-note { font-family: var(--mono); font-size: .72rem; color: var(--fg-faint); margin-top: .6rem; }

  .otable { overflow-x: auto; }
  .otable table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: .78rem; font-variant-numeric: tabular-nums; }
  .otable th, .otable td { text-align: right; padding: .45rem .6rem; border-bottom: 1px solid var(--rule); white-space: nowrap; }
  .otable th:first-child, .otable td:first-child { text-align: left; }
  .otable th { color: var(--fg-faint); font-weight: 500; font-size: .68rem; text-transform: uppercase; letter-spacing: .06em; }
  .otable tr.tot2 td { font-weight: 700; color: var(--fg); border-top: 1px solid var(--rule); }

  .loy { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .loy .lc { text-align: center; padding: 1rem; border: 1px solid var(--rule); border-radius: var(--r); }
  .loy .lc.bad { border-color: color-mix(in srgb, var(--crit) 40%, var(--rule)); }
  .loy .lc.good { border-color: color-mix(in srgb, var(--teal) 40%, var(--rule)); }
  .loy .lc small { display: block; font-size: .7rem; color: var(--fg-faint); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .35rem; }
  .loy .lc b { font-family: var(--mono); font-size: 1.2rem; }

  /* ---------- market ---------- */
  .eco { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-top: 1.4rem; }
  @media (max-width: 720px) { .eco { grid-template-columns: 1fr; } }
  .pills { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .8rem; }
  .pill { font-size: .8rem; padding: .4rem .7rem; border-radius: 999px; display: inline-flex; align-items: center; gap: .4rem; }
  .pill.on { background: color-mix(in srgb, var(--teal) 12%, transparent); color: var(--teal); border: 1px solid color-mix(in srgb, var(--teal) 28%, transparent); }
  .pill.off { background: var(--panel-2); color: var(--fg-faint); border: 1px dashed var(--rule); }
  .pill b { font-family: var(--mono); }
  .reportbtns { display: flex; flex-wrap: wrap; gap: .6rem; margin-top: 1.2rem; }
  .rbtn { font-family: var(--display); font-size: .84rem; font-weight: 600; text-decoration: none; padding: .55rem .9rem; border-radius: 999px;
          background: var(--teal); color: #fff; border: 1px solid var(--teal); }
  .rbtn.ghost { background: var(--panel); color: var(--fg-soft); border: 1px solid var(--rule); }

  /* explanatory content: overview, market trio, transparency, glossary */
  .overview { margin: 0 0 2.2rem; border-left: 3px solid var(--teal); }
  .overview h3 { font-family: var(--display); font-weight: 800; font-size: 1.05rem; margin: 0 0 .8rem; }
  .ov-list { list-style: none; margin: 0; padding: 0; display: grid; gap: .55rem; }
  .ov-list li { position: relative; padding-left: 1.5rem; font-size: .93rem; color: var(--fg-soft); }
  .ov-list li::before { content: "\2192"; position: absolute; left: 0; top: 0; color: var(--teal); font-weight: 800; }

  .trio { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 1rem; margin-top: 1.4rem; }
  @media (max-width: 900px){ .trio { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 520px){ .trio { grid-template-columns: 1fr; } }
  .tier { background: var(--panel); border: 1px solid var(--rule); border-radius: var(--r); padding: 1.2rem; box-shadow: var(--shadow); }
  .tier.win { border-color: color-mix(in srgb, var(--teal) 50%, var(--rule)); background: color-mix(in srgb, var(--teal) 6%, var(--panel)); }
  .tier .tname { font-weight: 800; font-size: .98rem; }
  .tier .tprice { font-family: var(--mono); font-size: 1.15rem; font-weight: 700; color: var(--teal); margin: .35rem 0; font-variant-numeric: tabular-nums; }
  .tier .tnote { font-size: .83rem; color: var(--fg-soft); }

  .abc { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 1rem; margin-top: 1.4rem; }
  @media (max-width: 760px){ .abc { grid-template-columns: 1fr; } }
  .abcard { background: var(--panel); border: 1px solid var(--rule); border-radius: var(--r); padding: 1.3rem; box-shadow: var(--shadow); }
  .abtag { display: inline-flex; align-items: center; justify-content: center; width: 2rem; height: 2rem; border-radius: 999px;
           background: color-mix(in srgb, var(--teal) 14%, transparent); color: var(--teal); font-family: var(--mono); font-weight: 700; font-size: 1rem; margin-bottom: .7rem; }
  .abcard h4 { font-family: var(--display); font-size: 1rem; margin: 0 0 .4rem; }
  .abcard p { margin: 0; font-size: .86rem; color: var(--fg-soft); }

  .gloss { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px,1fr)); gap: .1rem 1.8rem; margin-top: 1.2rem; }
  .gloss dt { font-weight: 700; color: var(--fg); font-size: .9rem; margin-top: .8rem; }
  .gloss dd { margin: .12rem 0 0; font-size: .86rem; color: var(--fg-soft); }

  /* ---------- cost calculator ---------- */
  .calc { display: grid; grid-template-columns: minmax(0, 320px) minmax(0, 1fr); gap: 1.4rem; align-items: start; margin-top: 2.2rem; }
  @media (max-width: 900px) { .calc { grid-template-columns: 1fr; } }
  .ccontrols { display: flex; flex-direction: column; gap: 1.3rem; padding: 1.3rem; }
  .ctl-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .45rem; }
  .ctl-label span:first-child { font-size: .8rem; color: var(--fg-soft); }
  .ctl-val { font-family: var(--mono); font-size: .82rem; font-weight: 600; color: var(--teal); font-variant-numeric: tabular-nums; }
  input[type="range"] { width: 100%; accent-color: var(--teal); height: 20px; }
  select.cc { width: 100%; font-family: var(--body); font-size: .86rem; padding: .55rem .6rem; background: var(--panel); color: var(--fg); border: 1px solid var(--rule); border-radius: var(--r-sm); }
  select.cc:focus-visible, input:focus-visible { outline: 2px solid var(--teal-lift); outline-offset: 1px; }
  .switch { display: flex; align-items: center; gap: .6rem; font-size: .84rem; color: var(--fg-soft); cursor: pointer; }
  .switch input { accent-color: var(--teal); width: 16px; height: 16px; }
  .readout { background: var(--panel); border: 1px solid var(--rule); border-radius: var(--r); box-shadow: var(--shadow); }
  .readout-top { padding: 1.3rem 1.4rem; border-bottom: 1px solid var(--rule); display: flex; flex-wrap: wrap; gap: 1.6rem; align-items: flex-end; }
  .big { font-family: var(--mono); font-size: clamp(1.9rem, 4vw, 2.7rem); font-weight: 700; letter-spacing: -.03em; font-variant-numeric: tabular-nums; line-height: 1; color: var(--fg); }
  .big small { font-size: .42em; font-weight: 500; color: var(--fg-faint); letter-spacing: 0; }
  .big-l { font-size: .72rem; text-transform: uppercase; letter-spacing: .12em; color: var(--fg-faint); font-family: var(--mono); margin-bottom: .4rem; }
  .delta { font-family: var(--mono); font-size: .78rem; padding: .3rem .55rem; border-radius: 999px; background: color-mix(in srgb, var(--brass) 15%, transparent); color: var(--brass); }
  canvas#chart { display: block; width: 100%; height: 340px; touch-action: none; cursor: grab; }
  canvas#chart:active { cursor: grabbing; }
  .canvas-note { padding: .5rem 1.4rem 1rem; font-family: var(--mono); font-size: .66rem; color: var(--fg-faint); letter-spacing: .04em; }
  .legend { display: flex; flex-wrap: wrap; gap: 1rem; padding: 0 1.4rem 1rem; }
  .lg { display: flex; align-items: center; gap: .4rem; font-size: .74rem; color: var(--fg-soft); }

  function renderOverview(){

      var o=OVERVIEW[tab][App.lang]||OVERVIEW[tab].de;
      var h="<h3>"+o.t+"</h3><ul class='ov-list'>";
      o.items.forEach(function(it){ h+="<li>"+it+"</li>"; });
      el.innerHTML=h+"</ul>";
    });
  }

      var saveBench=0; for(var y=0;y<yrs;y++){ saveBench+=(monthly*Math.pow(1+bench,y)-monthly)*12; }
      var discSave=base*disc*users*12*yrs;
      var refSave=(effGrowth-eff)*users*12*yrs;

      var msgSel=$("#msg"),prevMsg=msgSel.value||"wa"; fillSelect(msgSel,MSGS.map(function(m){ return m.id; }),MSG_NAMES[App.lang]); msgSel.value=prevMsg;
      var hostSel=$("#host"),prevHost=hostSel.value||"managed"; fillSelect(hostSel,["managed","self","selfSre"],HOST_NAMES[App.lang]); hostSel.value=prevHost;
    }
    function update(){
      var users=+$("#users").value, dues=+$("#dues").value; var railId=$("#rail").value, msgId=$("#msg").value, hostId=$("#host").value; var withBuild=$("#build").checked, rate=+$("#rate").value;
      var loc=App.lang==="en"?"en-US":App.lang==="ru"?"ru-RU":App.lang==="tr"?"tr-TR":"de-DE";
      $("#vUsers").textContent=users.toLocaleString(loc); $("#vDues").textContent=dues.toLocaleString(loc)+" ₺"; $("#vRate").textContent="€"+rate; $("#buildWrap").hidden=!withBuild;
      var r=compute(users,dues,railId,msgId,hostId), worst=compute(users,dues,"iyzicoL",msgId,hostId);
      $("#oUsd").innerHTML=fmtUsd(r.total)+" <small>/ mo</small>"; $("#oTry").textContent=fmtTry(r.total*FX); $("#oPer").textContent=(r.total*FX/users).toFixed(2)+" ₺";
      var saved=worst.total-r.total; $("#oSaveWrap").style.visibility=saved>1?"visible":"hidden"; $("#oSave").textContent="−"+fmtUsd(saved)+" / mo";
      var rows=[["#066B63",T[App.lang].lgCloud,r.cloud],["#4FA79D",T[App.lang].lgMsg,r.messaging],["#B9822B",T[App.lang].lgPay,r.payments]];
      var brk=$("#brk"); brk.innerHTML=""; rows.forEach(function(row){ var d=document.createElement("div"); d.className="brk-row"; var pct=r.total>0?Math.round(row[2]/r.total*100):0;
        d.innerHTML='<span class="brk-name"><span class="sw" style="background:'+row[0]+'"></span>'+row[1]+' <span style="color:var(--fg-faint);font-family:var(--mono);font-size:.72rem">'+pct+'%</span></span><span class="amt">'+fmtUsd(row[2])+'</span>'; brk.appendChild(d); });
      if(withBuild){ var oneOff=BUILD_DAYS*rate*1.1451; var d2=document.createElement("div"); d2.className="brk-row"; d2.style.borderTop="1px solid var(--rule)"; d2.style.marginTop=".4rem"; d2.style.paddingTop=".7rem";
        d2.innerHTML='<span class="brk-name" style="color:var(--fg)"><b>'+(App.lang==="de"?"Einmaliger Bauaufwand (~52 Tage)":App.lang==="tr"?"Tek seferlik yapım (~52 gün)":App.lang==="ru"?"Разовая разработка (~52 дня)":"One-off build (~52 days)")+'</b></span><span class="amt" style="color:var(--brass)">'+fmtUsd(oneOff)+'</span>'; brk.appendChild(d2); }
      var vals=SCALES.map(function(n){ return compute(n,dues,railId,msgId,hostId); }); chartState={vals:vals}; draw();
    }
    ["users","dues","rail","msg","host","build","rate"].forEach(function(id){ document.getElementById(id).addEventListener("input",update); });

    function setLang(){ renderStatic(); update(); }
    return { setLang:setLang, update:update, resize:resize };
  })();

  /* ================= 3D BUILDING SIM (hero) ================= */
  var BuildingSim = (function () {
    var cv = document.getElementById("bldg");
    if (!cv) return { resize:function(){} };
    var ctx = cv.getContext("2d"), yaw = -0.62, dpr = 1, tt = 0;
    var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var TEAL=[15,160,144], GOLD=[226,183,93];
    // tower cluster footprint (world units) with per-tower cube height
    var xs=[-1.55,-0.52,0.52,1.55], zs=[-0.52,0.52], HH=[[9,6,12,7],[7,13,8,11]];
    var TOW=[]; for(var iz=0;iz<zs.length;iz++) for(var ix=0;ix<xs.length;ix++) TOW.push({x:xs[ix],z:zs[iz],h:HH[iz][ix],ix:ix,iz:iz});
    var CW=0.44, GAP=0.9;

    function proj(x,y,z,cx,cy,u){ var c=Math.cos(yaw),s=Math.sin(yaw); var rx=x*c-z*s, rz=x*s+z*c; return {x:cx+rx*u, y:cy - y*u + rz*u*0.5, depth:rz}; }
    function rgb(c,m){ return "rgb("+Math.round(Math.min(255,c[0]*m))+","+Math.round(Math.min(255,c[1]*m))+","+Math.round(Math.min(255,c[2]*m))+")"; }
    function mix(a,b,f){ return [a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,a[2]+(b[2]-a[2])*f]; }
    function quad(p,fill){ ctx.beginPath(); ctx.moveTo(p[0].x,p[0].y); for(var i=1;i<4;i++) ctx.lineTo(p[i].x,p[i].y); ctx.closePath(); ctx.fillStyle=fill; ctx.fill(); }
    function cube(cx,cy,u,x,y0,z,s,color){
      var x1=x+s,z1=z+s,y1=y0+s;
      var top=[proj(x,y1,z,cx,cy,u),proj(x1,y1,z,cx,cy,u),proj(x1,y1,z1,cx,cy,u),proj(x,y1,z1,cx,cy,u)];
      var right=[proj(x1,y0,z,cx,cy,u),proj(x1,y1,z,cx,cy,u),proj(x1,y1,z1,cx,cy,u),proj(x1,y0,z1,cx,cy,u)];
      var front=[proj(x,y0,z1,cx,cy,u),proj(x,y1,z1,cx,cy,u),proj(x1,y1,z1,cx,cy,u),proj(x1,y0,z1,cx,cy,u)];
      quad(front,rgb(color,0.70)); quad(right,rgb(color,0.88)); quad(top,rgb(color,1.18));
    }
    function draw(){
      var w=cv.clientWidth, h=cv.clientHeight; if(w<2||h<2) return;
      ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,cv.width,cv.height); ctx.scale(dpr,dpr);
      var u=Math.min(w,h)*0.15, cx=w*0.5, cy=h*0.60;
      var list=[]; TOW.forEach(function(t){ var d=proj(t.x,0,t.z,cx,cy,u).depth; for(var k=0;k<t.h;k++) list.push({t:t,k:k,d:d}); });
      list.sort(function(a,b){ return a.d===b.d ? a.k-b.k : a.d-b.d; });
      list.forEach(function(o){
        var t=o.t,k=o.k, s=CW*GAP;
        var x=t.x-s/2, z=t.z-s/2, y0=k*CW;
        var lit=0.5+0.5*Math.sin(tt*1.15 - k*0.55 - (t.ix+t.iz)*0.7);
        var color=mix(TEAL,GOLD,Math.pow(lit,2.2)*0.9);
        cube(cx,cy,u,x,y0,z,s,color);
      });
    }
    function resize(){ dpr=Math.min(window.devicePixelRatio||1,2); if(cv.clientWidth<2) return; cv.width=cv.clientWidth*dpr; cv.height=cv.clientHeight*dpr; draw(); }
    if(!reduce){ setInterval(function(){ if(App.tab==="offer"){ yaw+=0.0032; tt+=0.05; draw(); } }, 45); }
    return { resize:resize };
  })();

  /* ================= CONTROLLER ================= */
  function showTab(tab){
    App.tab=tab;
    Array.prototype.forEach.call(document.querySelectorAll(".tab"),function(b){ b.setAttribute("aria-pressed",String(b.dataset.tab===tab)); });
    ["offer","market","cost","gaps"].forEach(function(p){ document.getElementById("page-"+p).hidden=(p!==tab); });
    if(tab==="offer"||tab==="market") Offer.render();
    if(tab==="offer") BuildingSim.resize();
    if(tab==="cost") Cost.resize();
    window.scrollTo(0,0);
  }
  Array.prototype.forEach.call(document.querySelectorAll(".tab"),function(b){ b.addEventListener("click",function(){ showTab(b.dataset.tab); }); });

  Array.prototype.forEach.call(document.querySelectorAll(".lang"),function(b){
    b.addEventListener("click",function(){
      App.lang=b.dataset.lang;
      Array.prototype.forEach.call(document.querySelectorAll(".lang"),function(o){ o.setAttribute("aria-pressed",String(o===b)); });
      applyUI(); renderOverview(); Offer.setLang(); Cost.setLang();
      if(App.tab==="cost") Cost.resize(); else Offer.render();
    });
  });

  document.getElementById("themeBtn").addEventListener("click",function(){
    var cur=document.documentElement.getAttribute("data-theme");
    var next=cur==="dark"?"light":"dark";
    document.documentElement.setAttribute("data-theme",next);
    if(App.tab==="cost") Cost.resize(); else Offer.render();
  });

  window.addEventListener("resize",function(){ clearTimeout(window._rt); window._rt=setTimeout(function(){ if(App.tab==="cost") Cost.resize(); else Offer.render(); if(App.tab==="offer") BuildingSim.resize(); },140); });

  // boot
  applyUI();
  renderOverview();
  Offer.setLang();
  Cost.setLang();
  Offer.render();
  BuildingSim.resize();
})();
</script>
