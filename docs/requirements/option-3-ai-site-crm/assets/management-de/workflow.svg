<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="690" viewBox="0 0 1400 690">
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" rx="18" fill="#FFFFFF"/>
  <rect x="34" y="30" width="1332" height="620" rx="24" fill="#FFFFFF" stroke="#CBD5E1"/>
<text x="70" y="86" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="34" font-weight="850" fill="#111827">Beispielablauf: vom Anliegen bis zum geprüften Abschluss</text>
<text x="70" y="120" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="20" font-weight="550" fill="#64748B">Der Ablauf ist für nicht-technische Entscheider bewusst als Betriebsprozess dargestellt.</text>
<rect x="72" y="190" width="335" height="132" rx="22" fill="#DBEAFE" stroke="#2563EB" filter="url(#softShadow)"/>
<circle cx="114" cy="234" r="26" fill="#2563EB"/>
<text x="114" y="244" text-anchor="middle" font-family="Arial Narrow, Arial, sans-serif" font-size="23" font-weight="900" fill="#FFFFFF">1</text>
<text x="158" y="238" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="24" font-weight="850" fill="#2563EB">Anliegen</text>
<text x="158" y="274" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="18" font-weight="600" fill="#334155">Bewohner meldet Bedarf</text>
<line x1="412" y1="256" x2="479" y2="256" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="492" y="190" width="335" height="132" rx="22" fill="#EDE9FE" stroke="#7C3AED" filter="url(#softShadow)"/>
<circle cx="534" cy="234" r="26" fill="#7C3AED"/>
<text x="534" y="244" text-anchor="middle" font-family="Arial Narrow, Arial, sans-serif" font-size="23" font-weight="900" fill="#FFFFFF">2</text>
<text x="578" y="238" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="24" font-weight="850" fill="#7C3AED">Prüfung</text>
<text x="578" y="274" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="18" font-weight="600" fill="#334155">Rolle, Saldo, Berechtigung</text>
<line x1="832" y1="256" x2="899" y2="256" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="912" y="190" width="335" height="132" rx="22" fill="#FEF3C7" stroke="#F59E0B" filter="url(#softShadow)"/>
<circle cx="954" cy="234" r="26" fill="#F59E0B"/>
<text x="954" y="244" text-anchor="middle" font-family="Arial Narrow, Arial, sans-serif" font-size="23" font-weight="900" fill="#FFFFFF">3</text>
<text x="998" y="238" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="24" font-weight="850" fill="#F59E0B">Freigabe</text>
<text x="998" y="274" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="18" font-weight="600" fill="#334155">Regel oder Managerentscheid</text>
<path d="M1080,328 L1080,368 L240,368 L240,415" fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="72" y="425" width="335" height="132" rx="22" fill="#CCFBF1" stroke="#0F766E" filter="url(#softShadow)"/>
<circle cx="114" cy="469" r="26" fill="#0F766E"/>
<text x="114" y="479" text-anchor="middle" font-family="Arial Narrow, Arial, sans-serif" font-size="23" font-weight="900" fill="#FFFFFF">4</text>
<text x="158" y="473" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="24" font-weight="850" fill="#0F766E">Ausführung</text>
<text x="158" y="509" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="18" font-weight="600" fill="#334155">Mitarbeiter oder</text>
<text x="158" y="531" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="18" font-weight="600" fill="#334155">Dienstleister</text>
<line x1="412" y1="491" x2="479" y2="491" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="492" y="425" width="335" height="132" rx="22" fill="#DCFCE7" stroke="#16A34A" filter="url(#softShadow)"/>
<circle cx="534" cy="469" r="26" fill="#16A34A"/>
<text x="534" y="479" text-anchor="middle" font-family="Arial Narrow, Arial, sans-serif" font-size="23" font-weight="900" fill="#FFFFFF">5</text>
<text x="578" y="473" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="24" font-weight="850" fill="#16A34A">Nachweis</text>
<text x="578" y="509" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="18" font-weight="600" fill="#334155">Foto, Kommentar, Abschluss</text>
<line x1="832" y1="491" x2="899" y2="491" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="912" y="425" width="335" height="132" rx="22" fill="#FFE4E6" stroke="#E11D48" filter="url(#softShadow)"/>
<circle cx="954" cy="469" r="26" fill="#E11D48"/>
<text x="954" y="479" text-anchor="middle" font-family="Arial Narrow, Arial, sans-serif" font-size="23" font-weight="900" fill="#FFFFFF">6</text>
<text x="998" y="473" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="24" font-weight="850" fill="#E11D48">Auswertung</text>
<text x="998" y="509" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="18" font-weight="600" fill="#334155">Bericht, Prüfspur,</text>
<text x="998" y="531" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="18" font-weight="600" fill="#334155">KI-Hinweis</text>
</svg>