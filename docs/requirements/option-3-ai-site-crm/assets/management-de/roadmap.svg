<rect x="150" y="535" width="1100" height="46" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
<text x="700" y="565" text-anchor="middle" font-family="Arial Narrow, Arial, sans-serif" font-size="19" font-weight="700" fill="#334155">Empfehlung: erst die Startversion stabilisieren, dann Zahlungen, KI und Integrationen ausbauen.</text>
