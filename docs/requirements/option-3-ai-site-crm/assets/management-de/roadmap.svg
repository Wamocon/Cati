<text x="70" y="86" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="34" font-weight="850" fill="#111827">Roadmap: stufenweise Umsetzung mit Management-Freigaben</text>
<text x="70" y="120" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="20" font-weight="550" fill="#64748B">Jede Phase liefert ein prüfbares Ergebnis. Entscheidungen werden bewusst vor der nächsten</text>
<text x="70" y="145" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="20" font-weight="550" fill="#64748B">Freigabe getroffen.</text>
