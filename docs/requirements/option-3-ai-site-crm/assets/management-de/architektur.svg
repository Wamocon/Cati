<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="750" viewBox="0 0 1400 750">
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" rx="18" fill="#FFFFFF"/>
  <rect x="34" y="30" width="1332" height="690" rx="24" fill="#FFFFFF" stroke="#CBD5E1"/>
<text x="70" y="86" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="34" font-weight="850" fill="#111827">Technisches Zielbild ohne Fachjargon</text>
<text x="70" y="120" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="20" font-weight="550" fill="#64748B">Die Architektur trennt Bedienung, Regeln, Daten und externe Systeme. Dadurch bleibt der Betrieb</text>
<text x="70" y="145" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="20" font-weight="550" fill="#64748B">kontrollierbar.</text>
<rect x="110" y="175" width="1180" height="84" rx="20" fill="#DBEAFE" stroke="#2563EB" filter="url(#softShadow)"/>
<text x="145" y="211" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="24" font-weight="850" fill="#2563EB">Nutzeroberflächen</text>
<text x="430" y="211" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="19" font-weight="650" fill="#334155">Web-App, mobile Ansicht, Übersicht, Mitarbeiteransicht</text>
<line x1="700" y1="263" x2="700" y2="287" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="110" y="290" width="1180" height="84" rx="20" fill="#CCFBF1" stroke="#0F766E" filter="url(#softShadow)"/>
<text x="145" y="326" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="24" font-weight="850" fill="#0F766E">Geschäftslogik</text>
<text x="430" y="326" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="19" font-weight="650" fill="#334155">Finanzen, Tickets, Buchungen, Dokumente, Kommunikation</text>
<line x1="700" y1="378" x2="700" y2="402" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="110" y="405" width="1180" height="84" rx="20" fill="#EDE9FE" stroke="#7C3AED" filter="url(#softShadow)"/>
<text x="145" y="441" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="24" font-weight="850" fill="#7C3AED">Kontrolle</text>
<text x="430" y="441" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="19" font-weight="650" fill="#334155">Rollen, Regeln, Prüfspur, Freigaben, KI-Leitplanken</text>
<line x1="700" y1="493" x2="700" y2="517" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="110" y="520" width="1180" height="84" rx="20" fill="#FEF3C7" stroke="#F59E0B" filter="url(#softShadow)"/>
<text x="145" y="556" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="24" font-weight="850" fill="#F59E0B">Datenbasis</text>
<text x="430" y="556" text-anchor="start" font-family="Arial Narrow, Arial, sans-serif" font-size="19" font-weight="650" fill="#334155">Supabase, Twenty CRM, Zahlungsanbieter, Zutritt, Benachrichtigung</text>
<rect x="250" y="640" width="900" height="44" rx="15" fill="#F8FAFC" stroke="#CBD5E1"/>
<text x="700" y="668" text-anchor="middle" font-family="Arial Narrow, Arial, sans-serif" font-size="19" font-weight="750" fill="#334155">Leitprinzip: jede sensible Aktion braucht Rollenprüfung, Geschäftsregel und Prüfspur.</text>
</svg>