  .sw { width: 10px; height: 10px; border-radius: 1px; }

  .breakdown { border-top: 1px solid var(--rule); padding: 1rem 1.4rem 1.3rem; }
  .brk-row { display: flex; justify-content: space-between; align-items: center; padding: .5rem 0;
             border-bottom: 1px dashed var(--rule); font-size: .86rem; }
  .brk-row:last-child { border-bottom: 0; }
  .brk-row .amt { font-family: var(--mono); font-variant-numeric: tabular-nums; font-weight: 600; }
  .brk-name { display: flex; align-items: center; gap: .5rem; color: var(--fg-soft); }

  ol.dec { list-style: none; counter-reset: d; margin: 0; padding: 0;

  ol.dec li { counter-increment: d; background: var(--panel); padding: 1.1rem 1.2rem; }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

  function interp(anchors, n) {
    if (n <= anchors[0][0]) return anchors[0][1];
    var last = anchors[anchors.length - 1];
    if (n >= last[0]) return last[1];
    for (var i = 0; i < anchors.length - 1; i++) {
      var a = anchors[i], b = anchors[i + 1];
      if (n >= a[0] && n <= b[0]) {
        var t = (n - a[0]) / (b[0] - a[0]);
        return a[1] + (b[1] - a[1]) * t;
      }
    }
    return last[1];
  }

    var messaging = users * m.mult * m.unit + users * 3 * 0.0001; // + SES email
    var payments = payCost(users, dues, rail);
    return { cloud: cloud, messaging: messaging, payments: payments, total: cloud + messaging + payments };
  }

  function fmtUsd(n) {
    return "$" + Math.round(n).toLocaleString(lang === "en" ? "en-US" : lang === "ru" ? "ru-RU" : lang === "tr" ? "tr-TR" : "de-DE");
  }
  function fmtTry(n) {
    return Math.round(n).toLocaleString(lang === "en" ? "en-US" : lang === "ru" ? "ru-RU" : lang === "tr" ? "tr-TR" : "de-DE") + " ₺";
  }

  // ---------- 3D isometric chart (hand-rolled; Three.js cannot load under CSP) ----------
  var cv = $("#chart"), ctx = cv.getContext("2d");
  var yaw = -0.62, dragging = false, lastX = 0, dpr = 1;
  var SCALES = [500, 1000, 2500, 5000, 10000];
  var chartState = null;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    cv.width = cv.clientWidth * dpr;
    cv.height = cv.clientHeight * dpr;
    draw();
  }

  function proj(x, y, z, cx, cy) {
    var c = Math.cos(yaw), s = Math.sin(yaw);
    var rx = x * c - z * s;
    var rz = x * s + z * c;
    var k = 0.55;                       // vertical foreshortening
    return { x: cx + rx, y: cy + rz * k - y, depth: rz };
  }

  function face(pts, fill) {
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();
  }

  function shade(hex, f) {
    var r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    r = Math.round(Math.min(255, r * f)); g = Math.round(Math.min(255, g * f)); b = Math.round(Math.min(255, b * f));
    return "rgb(" + r + "," + g + "," + b + ")";
  }

  function box(cx, cy, x, z, w, d, y0, h, color) {
    var top = [proj(x, y0 + h, z, cx, cy), proj(x + w, y0 + h, z, cx, cy),
               proj(x + w, y0 + h, z + d, cx, cy), proj(x, y0 + h, z + d, cx, cy)];
    var right = [proj(x + w, y0, z, cx, cy), proj(x + w, y0 + h, z, cx, cy),
                 proj(x + w, y0 + h, z + d, cx, cy), proj(x + w, y0, z + d, cx, cy)];
    var front = [proj(x, y0, z + d, cx, cy), proj(x, y0 + h, z + d, cx, cy),
                 proj(x + w, y0 + h, z + d, cx, cy), proj(x + w, y0, z + d, cx, cy)];
    face(front, shade(color, 0.72));
    face(right, shade(color, 0.86));
    face(top, shade(color, 1.12));
  }

  function draw() {
    if (!chartState) return;
    var W = cv.width, H = cv.height;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, W, H);
    ctx.scale(dpr, dpr);
    var w = cv.clientWidth, h = cv.clientHeight;
    var cx = w / 2, cy = h * 0.66;

    var vals = chartState.vals;
    var max = 0;
    for (var i = 0; i < vals.length; i++) max = Math.max(max, vals[i].total);
    if (max <= 0) max = 1;
    var HMAX = h * 0.46;

    var bw = 30, bd = 30, gap = 22;
    var span = SCALES.length * bw + (SCALES.length - 1) * gap;
    var x0 = -span / 2;

    // ground grid
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--rule").trim() || "rgba(0,0,0,.1)";
    ctx.lineWidth = 1;
    for (var g = -1; g <= SCALES.length; g++) {
      var gx = x0 + g * (bw + gap) - gap / 2;
      var p1 = proj(gx, 0, -40, cx, cy), p2 = proj(gx, 0, 70, cx, cy);
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    }

    // sort bars back-to-front so painters algorithm holds under rotation
    var order = [];
    for (var i2 = 0; i2 < SCALES.length; i2++) {
      var bx = x0 + i2 * (bw + gap);
      order.push({ i: i2, x: bx, depth: proj(bx + bw / 2, 0, bd / 2, cx, cy).depth });
    }
    order.sort(function (a, b) { return a.depth - b.depth; });

    var faint = getComputedStyle(document.documentElement).getPropertyValue("--fg-faint").trim() || "#888";
    var fg = getComputedStyle(document.documentElement).getPropertyValue("--fg").trim() || "#000";
    var panel = getComputedStyle(document.documentElement).getPropertyValue("--panel").trim() || "#fff";
    var valueLabels = [];

    for (var k = 0; k < order.length; k++) {
      var o = order[k], v = vals[o.i];
      var hc = (v.cloud / max) * HMAX;
      var hm = (v.messaging / max) * HMAX;
      var hp = (v.payments / max) * HMAX;
      box(cx, cy, o.x, 0, bw, bd, 0, hc, "#2BB8A5");
      box(cx, cy, o.x, 0, bw, bd, hc, hm, "#7FD6C6");
      box(cx, cy, o.x, 0, bw, bd, hc + hm, hp, "#B8762C");

      var lp = proj(o.x + bw / 2, 0, bd + 16, cx, cy);
      ctx.fillStyle = faint;
      ctx.font = "500 10px ui-monospace, monospace";
      ctx.textAlign = "center";
      ctx.fillText(SCALES[o.i] >= 1000 ? (SCALES[o.i] / 1000) + "k" : SCALES[o.i], lp.x, lp.y + 12);

      var tp = proj(o.x + bw / 2, hc + hm + hp + 10, bd / 2, cx, cy);
      valueLabels.push({ x: tp.x, y: tp.y, text: fmtUsd(v.total) });
    }

    // Draw value labels last, with a backing pill and vertical de-collision so
    // every number stays legible at any rotation angle.
    valueLabels.sort(function (a, b) { return a.y - b.y; });
    ctx.font = "600 11px ui-monospace, monospace";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    var minGap = 15;
    for (var li = 1; li < valueLabels.length; li++) {
      if (valueLabels[li].y - valueLabels[li - 1].y < minGap) {
        valueLabels[li].y = valueLabels[li - 1].y + minGap;
      }
    }
    for (var lj = 0; lj < valueLabels.length; lj++) {
      var L = valueLabels[lj];
      var w = ctx.measureText(L.text).width + 10;
      var hh = 15;
      ctx.globalAlpha = 0.82;
      ctx.fillStyle = panel;
      var rx = L.x - w / 2, ry = L.y - hh / 2, rr = 3;
      ctx.beginPath();
      ctx.moveTo(rx + rr, ry);
      ctx.arcTo(rx + w, ry, rx + w, ry + hh, rr);
      ctx.arcTo(rx + w, ry + hh, rx, ry + hh, rr);
      ctx.arcTo(rx, ry + hh, rx, ry, rr);
      ctx.arcTo(rx, ry, rx + w, ry, rr);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = fg;
      ctx.fillText(L.text, L.x, L.y);
    }
    ctx.textBaseline = "alphabetic";
  }

  cv.addEventListener("pointerdown", function (e) { dragging = true; lastX = e.clientX; cv.setPointerCapture(e.pointerId); });
  cv.addEventListener("pointermove", function (e) {
    if (!dragging) return;
    yaw += (e.clientX - lastX) * 0.008; lastX = e.clientX; draw();
  });
  cv.addEventListener("pointerup", function () { dragging = false; });
  cv.addEventListener("pointercancel", function () { dragging = false; });
  window.addEventListener("resize", resize);

  var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (!reduce) {
    setInterval(function () { if (!dragging) { yaw += 0.0016; draw(); } }, 40);
  }

  // ---------- render ----------
  function fillSelect(el, ids, names) {
    el.innerHTML = "";
    ids.forEach(function (id) {
      var o = document.createElement("option");
      o.value = id; o.textContent = names[id];
      el.appendChild(o);
    });
  }

  function renderStatic() {
    var t = T[lang];
    Object.keys(t).forEach(function (k) {
      var el = document.querySelector('[data-i="' + k + '"]');
      if (el) el.textContent = t[k];
    });
    document.documentElement.lang = lang;

    function fillList(elId, rows) {
      var el = document.querySelector(elId);
      el.innerHTML = "";
      rows.forEach(function (r) {
        var li = document.createElement("li");
        li.innerHTML = '<span class="k">' + r[0] + '</span><span class="v">' + r[1] + '</span>';
        el.appendChild(li);
      });
    }
    fillList("#okList", LISTS[lang].ok);
    fillList("#badList", LISTS[lang].bad);
    fillList("#pipeList", LISTS[lang].pipe);

    var tb = $("#blkTable"); tb.innerHTML = "";
    BLK[lang].forEach(function (r, i) {
      var tr = document.createElement("tr");
      tr.innerHTML = "<td>" + r[0] + "</td><td>" + r[1] + "</td><td" + (i === 2 ? ' class="danger"' : "") + ">" + r[2] + "</td>";
      tb.appendChild(tr);
    });

    var dl = $("#decList"); dl.innerHTML = "";
    DEC[lang].forEach(function (d) {
      var li = document.createElement("li");
      li.innerHTML = "<b>" + d[0] + "</b><span>" + d[1] + "</span><span class='urg'>" + d[2] + "</span>";
      dl.appendChild(li);
    });

    var railSel = $("#rail"), prevRail = railSel.value || "a2a";
    fillSelect(railSel, RAILS.map(function (r) { return r.id; }), RAIL_NAMES[lang]);
    railSel.value = prevRail;

    var msgSel = $("#msg"), prevMsg = msgSel.value || "wa";
    fillSelect(msgSel, MSGS.map(function (m) { return m.id; }), MSG_NAMES[lang]);
    msgSel.value = prevMsg;

    var hostSel = $("#host"), prevHost = hostSel.value || "managed";
    fillSelect(hostSel, ["managed", "self", "selfSre"], HOST_NAMES[lang]);
    hostSel.value = prevHost;
  }

  function update() {
    var users = +$("#users").value, dues = +$("#dues").value;
    var railId = $("#rail").value, msgId = $("#msg").value, hostId = $("#host").value;
    var withBuild = $("#build").checked, rate = +$("#rate").value;

    var loc = lang === "en" ? "en-US" : lang === "ru" ? "ru-RU" : lang === "tr" ? "tr-TR" : "de-DE";
    $("#vUsers").textContent = users.toLocaleString(loc);
    $("#vDues").textContent = dues.toLocaleString(loc) + " ₺";
    $("#vRate").textContent = "€" + rate;
    $("#buildWrap").hidden = !withBuild;

    var r = compute(users, dues, railId, msgId, hostId);
    var worst = compute(users, dues, "iyzicoL", msgId, hostId);

    $("#oUsd").innerHTML = fmtUsd(r.total) + " <small>/ mo</small>";
    $("#oTry").textContent = fmtTry(r.total * FX);
    $("#oPer").textContent = (r.total * FX / users).toFixed(2) + " ₺";

    var saved = worst.total - r.total;
    $("#oSaveWrap").style.visibility = saved > 1 ? "visible" : "hidden";
    $("#oSave").textContent = "−" + fmtUsd(saved) + " / mo";

    var rows = [
      ["#2BB8A5", T[lang].lgCloud, r.cloud],
      ["#7FD6C6", T[lang].lgMsg, r.messaging],
      ["#B8762C", T[lang].lgPay, r.payments]
    ];
    var brk = $("#brk"); brk.innerHTML = "";
    rows.forEach(function (row) {
      var d = document.createElement("div");
      d.className = "brk-row";
      var pct = r.total > 0 ? Math.round(row[2] / r.total * 100) : 0;
      d.innerHTML = '<span class="brk-name"><span class="sw" style="background:' + row[0] + '"></span>' + row[1] +
                    ' <span style="color:var(--fg-faint);font-family:var(--mono);font-size:.72rem">' + pct + '%</span></span>' +
                    '<span class="amt">' + fmtUsd(row[2]) + '</span>';
      brk.appendChild(d);
    });

    if (withBuild) {
      var oneOff = BUILD_DAYS * rate * 1.1451; // EUR→USD
      var d2 = document.createElement("div");
      d2.className = "brk-row";
      d2.style.borderTop = "1px solid var(--rule)";
      d2.style.marginTop = ".4rem";
      d2.style.paddingTop = ".7rem";
      d2.innerHTML = '<span class="brk-name" style="color:var(--fg)"><b>' +
        (lang === "de" ? "Einmaliger Bauaufwand (~52 Tage)" :
         lang === "tr" ? "Tek seferlik yapım (~52 gün)" :
         lang === "ru" ? "Разовая разработка (~52 дня)" : "One-off build (~52 days)") +
        '</b></span><span class="amt" style="color:var(--brass)">' + fmtUsd(oneOff) + '</span>';
      brk.appendChild(d2);
    }

    var vals = SCALES.map(function (n) { return compute(n, dues, railId, msgId, hostId); });
    chartState = { vals: vals };
    draw();
  }

  ["users", "dues", "rail", "msg", "host", "build", "rate"].forEach(function (id) {
    document.getElementById(id).addEventListener("input", update);
  });

  Array.prototype.forEach.call(document.querySelectorAll(".lang"), function (b) {
    b.addEventListener("click", function () {
      lang = b.dataset.lang;
      Array.prototype.forEach.call(document.querySelectorAll(".lang"), function (o) {
        o.setAttribute("aria-pressed", String(o === b));
      });
      renderStatic(); update();
    });
  });

  $("#themeBtn").addEventListener("click", function () {
    var cur = document.documentElement.getAttribute("data-theme");
    var next = cur === "dark" ? "light" : cur === "light" ? "dark"
      : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", next);
    draw();
  });

  renderStatic();
  resize();
  update();
})();
</script>
